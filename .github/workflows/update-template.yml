name: Update from template

# Pull the latest buy-me-a-chai template into your fork — without a terminal
# (ADR-031). Run it from the Actions tab: "Update from template" → Run workflow.
# It merges the template, keeps YOUR chai.config.yaml and public/ untouched, checks
# the result builds, and opens a pull request for you to review and merge — or, if you
# tick "Apply straight to main", applies it and redeploys without asking (ADR-041).
#
# It never runs on a schedule: GitHub disables scheduled workflows after 60 days of
# repository inactivity, and a donation page is inactive by design — a cron would
# look like it works and then quietly stop. This button always works.

on:
  workflow_dispatch:
    inputs:
      upstream:
        description: Template repository to pull from (owner/repo)
        required: false
        default: shivams136/buy-me-a-chai
      direct:
        description: Apply straight to main and redeploy, without opening a pull request
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  # Only for `direct`: a push made with GITHUB_TOKEN cannot start another workflow
  # run, so the Pages deploy has to be dispatched by hand (ADR-041). Unreachable by
  # the untrusted verify step, which carries no token at all.
  actions: write

concurrency:
  group: update-template
  cancel-in-progress: false

jobs:
  update:
    name: Merge the template and publish the update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history: merging the template needs both sides' commits.
          fetch-depth: 0
          # SECURITY (do not remove): the "Check the merge" step below runs merged,
          # upstream-controlled code (`vite build`, tests). With the default
          # persist-credentials:true, the write-scoped GITHUB_TOKEN sits in
          # .git/config where that untrusted code could read it and push a poisoned
          # config to your default branch. Keeping the token OUT of the checkout means
          # the merge code has no credential to steal; the token is used only in the
          # final push step, by an explicit URL, after the untrusted code has run.
          persist-credentials: false

      - name: Merge the template, keeping your config and assets
        id: merge
        env:
          # Passed via env, never interpolated into the script, and validated below —
          # a workflow_dispatch input is untrusted text.
          UPSTREAM: ${{ inputs.upstream }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if ! printf '%s' "$UPSTREAM" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "::error::Invalid upstream '$UPSTREAM' — expected owner/repo."
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # A public repo — fetch needs no credentials (there are none persisted).
          git remote add upstream "https://github.com/$UPSTREAM.git"
          git fetch --no-tags --quiet upstream

          # One fixed branch, force-pushed below — not a timestamped one per run.
          # Timestamped branches orphaned a branch every time a run failed or could not
          # open its pull request, so a creator accumulated `template-update-*` refs and
          # had to work out which was current. Re-running now rewrites this same branch
          # and updates any open pull request in place, the way dependency bots do.
          BRANCH="template-update"
          git switch -c "$BRANCH"

          # Prefer the template for code conflicts (-X theirs); --allow-unrelated-histories
          # covers the first-ever merge, when the fork shares no history with the template.
          # --no-commit lets us restore your files before the merge is recorded.
          git merge --no-commit --allow-unrelated-histories -X theirs upstream/main || true

          # Your files always win: restore them from your branch tip (still HEAD here).
          git checkout HEAD -- chai.config.yaml 2>/dev/null || true
          git checkout HEAD -- public 2>/dev/null || true

          # Drop every template change to workflow files — modified AND newly added: the
          # automation token is not allowed to push under .github/workflows/. Record which
          # ones changed so we can flag them (in the PR, or the run summary if there is no PR).
          WF_CHANGED="$(git diff --name-only HEAD upstream/main -- .github/workflows/ || true)"
          git reset -q -- .github/workflows/ 2>/dev/null || true
          git clean -fdq .github/workflows/ 2>/dev/null || true
          git checkout HEAD -- .github/workflows/ 2>/dev/null || true

          git add -A

          # Emit the workflow-changed list unconditionally, so it is available whether or
          # not a PR is opened.
          {
            echo "wf_changed<<WF_EOF"
            echo "$WF_CHANGED"
            echo "WF_EOF"
          } >> "$GITHUB_OUTPUT"

          has_wf_changes() { [ -n "$(printf '%s' "$WF_CHANGED" | tr -d '[:space:]')" ]; }

          if git diff --cached --quiet; then
            # Nothing to PR. But if the ONLY upstream change was workflow files, they were
            # just stripped — so surface them in the run summary instead of silently
            # claiming "up to date" and swallowing a workflow security fix.
            if has_wf_changes; then
              {
                echo "### Template update — workflow files only"
                echo ""
                echo "The template changed only GitHub Actions workflow files, which this"
                echo "automation cannot push (GitHub blocks it). Copy them across by hand:"
                echo ""
                echo '```'
                echo "$WF_CHANGED"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              echo "::warning::The template updated only workflow files — see the run summary to copy them by hand."
            else
              echo "Already up to date with the template — nothing to do."
              {
                echo "### Already up to date"
                echo ""
                echo "The template has nothing new for you. Your page is unchanged."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit --no-verify -m "chore: update from template ($UPSTREAM)"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"
          # The exact commit we will publish, captured BEFORE any untrusted code runs.
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v6
        if: steps.merge.outputs.changed == 'true'

      - uses: actions/setup-node@v7
        if: steps.merge.outputs.changed == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Check the merge still builds and passes
        if: steps.merge.outputs.changed == 'true'
        # Runs the merged (template + your) code — the same code you are about to adopt,
        # from the template you chose to track. It runs with NO credential reachable: the
        # checkout persisted none (persist-credentials:false above) and no token is in this
        # step's environment, so untrusted code has nothing to steal and cannot push. What
        # gets published is pinned to the SHA captured before this step, so nothing this
        # step does to the worktree or local refs can change it. A green run is your signal
        # the merge is safe to accept (a PR opened by the automation token does not itself
        # trigger CI). A red run fails the job here and no PR is opened.
        run: |
          pnpm install --frozen-lockfile
          pnpm verify

      - name: Publish it — direct to main, or as a pull request
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ steps.merge.outputs.branch }}
          BASE: ${{ steps.merge.outputs.base }}
          SHA: ${{ steps.merge.outputs.sha }}
          WF_CHANGED: ${{ steps.merge.outputs.wf_changed }}
          UPSTREAM: ${{ inputs.upstream }}
          DIRECT: ${{ inputs.direct }}
        run: |
          set -euo pipefail
          # Push the exact verified commit by SHA (not the local branch ref) via a tokened
          # URL. The token exists only in this step, after the untrusted verify step has
          # finished, and pushing the pinned SHA means a tampered local ref cannot be published.
          # --force because BRANCH is the single, bot-owned update branch: an earlier
          # run may have left it behind (merged, abandoned, or never PR'd) and its
          # history is deliberately disposable. Still a pinned SHA, so what gets
          # published is exactly what the verify step checked.
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push --force "$REMOTE" "${SHA}:refs/heads/${BRANCH}"

          # `direct`: apply to the default branch instead of asking for a review
          # (ADR-041). The branch above is pushed first either way, so a refused
          # fast-forward or a protected main costs nothing — we fall through to the
          # pull request with the update already safe on its branch.
          if [ "${DIRECT:-false}" = "true" ]; then
            # No --force: main is yours. If it moved since checkout, or a branch rule
            # says no, the push is refused and the pull request path takes over.
            if git push "$REMOTE" "${SHA}:refs/heads/${BASE}"; then
              # A push made with GITHUB_TOKEN cannot start another workflow run, so
              # `on: push` never sees this one and the page would sit on its old build.
              # workflow_dispatch is the documented exception to that rule — kick the
              # deploy explicitly. A repo that publishes some other way (Vercel, a
              # custom domain pipeline) simply has no such workflow; say so rather
              # than fail, the code is already applied.
              DEPLOY="The Pages deploy is running now — your page updates in a minute or two."
              if git cat-file -e "${SHA}:.github/workflows/deploy-pages.yml" 2>/dev/null; then
                gh workflow run deploy-pages.yml --ref "$BASE" \
                  || DEPLOY="Applied, but the deploy could not be started automatically — run **Deploy to GitHub Pages** from the Actions tab."
              else
                DEPLOY="This repo has no Pages deploy workflow, so publish it the way you normally do."
              fi
              {
                echo "### Template update applied to \`${BASE}\`"
                echo ""
                echo "\`pnpm verify\` passed on the merge, so it went straight to your"
                echo "default branch — no pull request, because you asked for **direct**."
                echo ""
                echo "$DEPLOY"
                echo ""
                echo "Your \`chai.config.yaml\` and everything in \`public/\` are untouched."
                echo "To undo it: revert commit \`${SHA}\` on \`${BASE}\`."
                # Without a PR body to carry it, this is the only place the stripped
                # workflow list can appear.
                if [ -n "$(printf '%s' "$WF_CHANGED" | tr -d '[:space:]')" ]; then
                  echo ""
                  echo "⚠️ These workflow files also changed upstream and were **not**"
                  echo "applied — GitHub blocks automated writes to \`.github/workflows/\`."
                  echo "Copy them across by hand if you want them:"
                  echo ""
                  echo '```'
                  echo "$WF_CHANGED"
                  echo '```'
                fi
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "::warning::Could not apply directly to ${BASE} (it moved, or a branch rule blocks it) — opening a pull request instead."
          fi

          # A green run means "the update is ready", NOT "the update is live" — the
          # creator still has to merge. Saying so on every successful run is the whole
          # point of this summary: a tick with no next step reads as "done", and the
          # creator goes looking for changes on their page that are sitting on a branch.
          ready_summary() {
            {
              echo "### Template update is ready — one merge away"
              echo ""
              echo "$2"
              echo ""
              echo "$1"
              echo ""
              echo "\`pnpm verify\` passed on the merged code. **Your page has not changed"
              echo "yet** — review the diff and merge it, and your page redeploys itself."
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # The force-push has already updated any pull request open on this branch, so
          # creating a second one would just fail. Reuse it and say so.
          EXISTING="$(gh pr list --head "$BRANCH" --state open --json url -q '.[0].url' 2>/dev/null || true)"
          if [ -n "$EXISTING" ]; then
            echo "Updated the pull request already open on $BRANCH: $EXISTING"
            ready_summary "$EXISTING" "The pull request already open for this update now has the latest template:"
            exit 0
          fi

          BODY="Automated update from the template \`$UPSTREAM\`.

          Your \`chai.config.yaml\` is untouched, and every file you have in \`public/\` was kept exactly as it is — your avatar, your social card, your CNAME. The template may *add* a new file there; it can never overwrite or delete yours. \`pnpm verify\` passed on the merge.

          Review the diff and merge when it looks good. (If you have edited component source yourself, those files were overwritten with the template's — that path is for creators who only edit config; a developer resolves their own merges.)"

          if [ -n "$(printf '%s' "$WF_CHANGED" | tr -d '[:space:]')" ]; then
            BODY="$BODY

          ⚠️ The template also changed these workflow files, which this PR does **not** include — GitHub blocks automated pushes to \`.github/workflows/\`. Copy them across by hand if you want the changes:
          \`\`\`
          $WF_CHANGED
          \`\`\`"
          fi

          # Opening the PR needs the repository's "Allow GitHub Actions to create and
          # approve pull requests" setting, which GitHub leaves OFF on every new repo —
          # so the *first* run of this button fails here for most creators, with a raw
          # "Resource not accessible by integration" that explains nothing. By this
          # point the merge is already pushed and verified, so the work is not lost:
          # hand back a one-click link instead of a red X (ADR-031's no-terminal
          # promise has to survive its own last step).
          if PR_OUT="$(gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "Update from template ($UPSTREAM)" \
            --body "$BODY" 2>&1)"; then
            echo "$PR_OUT"
            PR_URL="$(printf '%s\n' "$PR_OUT" | grep -Eo 'https://[^[:space:]]+/pull/[0-9]+' | tail -n1)"
            ready_summary "${PR_URL:-See the Pull requests tab.}" "A pull request with the latest template is open on your repo:"
            exit 0
          fi
          # Keep gh's own error in the log — the summary below explains the usual cause,
          # but a different failure should still be readable.
          echo "$PR_OUT"

          COMPARE="${GITHUB_SERVER_URL}/${REPO}/compare/${BASE}...${BRANCH}?expand=1"
          {
            echo "### Template update is ready — one click needed"
            echo ""
            echo "The merge succeeded and \`pnpm verify\` passed. Only the final step"
            echo "failed: this repository does not let GitHub Actions open pull"
            echo "requests, so the branch was pushed but no PR was created."
            echo ""
            echo "**Your page has not changed yet, and nothing is lost — open the pull"
            echo "request yourself, then merge it:**"
            echo ""
            echo "$COMPARE"
            echo ""
            echo "**Or enable the button permanently:** Settings → Actions → General →"
            echo "Workflow permissions → tick *Allow GitHub Actions to create and"
            echo "approve pull requests* → Save. Future runs will open the PR for you."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Update ready but NOT applied: this repo blocks Actions from opening PRs, so the branch was pushed without one — see the run summary for a one-click link."
