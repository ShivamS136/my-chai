# yaml-language-server: $schema=./chai.schema.json
#
# chai.config.yaml — this is the only file you need to edit.
#
# Every value below drives your page. Your editor reads chai.schema.json (the line
# above), so you get autocomplete and inline help on each field — in VS Code and in
# GitHub's web editor (press `.` in your repo). Full reference: docs/CONFIG.md.
#
# ⚠️  Replace creator.vpa with YOUR UPI ID before deploying. The placeholder below is
#     a valid *format*, so validation accepts it — but a separate deploy check rejects
#     it on purpose, so a fresh fork can never publish a page that points at nobody.
#     Copy-paste the ID from your UPI app; do not type it.

creator:
  name: Your Name
  # ⚠️  YOUR UPI ID GOES HERE. Open your UPI app → profile → "UPI ID".
  vpa: yourname@bank
  tagline: Building open-source tools ☕
  # Drop a square image at public/avatar.png and uncomment, or delete this line for
  # an initials avatar.
  # avatar: /avatar.png
  bio: >-
    I build **open-source** things and write about them. If something here saved you
    an afternoon, a chai is a lovely way to say thanks.
  socials:
    - label: GitHub
      url: https://github.com/your-handle

# Your projects. Replace with your own, or delete the list to hide the section.
works:
  - title: My side project
    # Up to 300 characters, and your line breaks are kept — `>-` flows one
    # paragraph, `|-` keeps the breaks exactly as you type them.
    description: >-
      A thing I built and wrote about. There is room for a couple of sentences
      here, so say what it actually does and who it is for.
    url: https://github.com/your-handle/my-project

chai:
  # The one-tap chips: up to 4 named tiers, each with its own rupee amount. Name them
  # after something real — a donor picks "Cutting chai" far more readily than "₹20".
  # Sorted by amount automatically, and the cheapest is selected by default.
  # `emoji` is optional decoration (up to 3 glyphs); delete it for a text-only chip.
  presets:
    - label: Cutting chai
      amount: 20
      emoji: ☕
    - label: Chai for me and you
      amount: 50
      emoji: ☕☕
    - label: 2 chai + chips
      amount: 100
      emoji: ☕☕🍟
  allowCustomAmount: true
  maxAmountWarning: 100000
  # Attached to the payment when a donor leaves the message field empty.
  defaultNote: Chai for your work
  allowDonorMessage: true

theme:
  # light / dark PIN the palette; auto follows the visitor's OS.
  mode: auto
  # The one palette knob (hex / rgb() / oklch()). Recolours the CTA, borders, focus
  # rings and accent text — never the off-white canvas, which is brand-locked.
  accent: '#C4622D'

meta:
  # Both default to your name: the tab title becomes `Buy {creator.name} a chai`,
  # and the shared-link description names you too. Uncomment to write your own.
  # title: Buy Your Name a chai
  # description: Support my open-source work — 0% commission, direct UPI.
  #
  # The picture people see when your link is shared (WhatsApp, X, LinkedIn, Slack).
  # To use your own, drop a 1200x630 image at public/og.png — no config change
  # needed, and your file survives template updates. Point this elsewhere for a
  # different filename, or delete the line for a link preview with no picture.
  ogImage: /og.png
  language: en

# Analytics is OFF by default: with no `analytics` block the page makes zero network
# calls and ships no tracking code at all. To turn it on, uncomment this and set
# VITE_POSTHOG_KEY in your host's environment variables (see docs/SETUP.md). The key
# is injected at build time — it is never written in this file.
#
# analytics:
#   provider: posthog
#   host: https://eu.i.posthog.com   # default; use https://us.i.posthog.com on US cloud.
#                                    # Get this wrong and PostHog accepts every event and
#                                    # then throws it away, with no error anywhere (ADR-039).

# Branding is the buy-me-a-chai template's two small links (masthead CTA + footer
# credit) — the MAKER (who wrote the template) and their PROJECT, as opposed to the
# `creator` and `works` above, which are you. It defaults to the template author's,
# and updates to theirs on a template pull. To make it yours, uncomment and edit —
# no code change needed, this block is the only place these values live (ADR-032).
# (Removing the links entirely is still a source edit, in Masthead.tsx / Footer.tsx.)
#
# branding:
#   maker:
#     name: Your Name
#     supportUrl: https://buymeacoffee.com/your-handle
#   project:
#     name: my-chai-page
#     repoUrl: https://github.com/your-handle/my-chai-page
#     templateUrl: https://github.com/your-handle/my-chai-page/generate
